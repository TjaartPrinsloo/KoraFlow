name: Deploy to Production

on:
  push:
    branches: [main]
    paths:
      - 'bench/apps/koraflow_core/**'
  workflow_dispatch:          # allow manual trigger

jobs:
  deploy:
    name: Deploy koraflow_core to server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Sync koraflow_core to server
        run: |
          rsync -az --delete \
            --exclude='*.pyc' \
            --exclude='__pycache__' \
            --exclude='*.egg-info' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            bench/apps/koraflow_core/ \
            frappe@156.38.193.194:/home/frappe/frappe-bench/apps/koraflow_core/

      - name: Reinstall app, migrate, build, restart
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            frappe@156.38.193.194 << 'ENDSSH'
            set -e
            export PATH=/home/frappe/.local/bin:/usr/local/bin:$PATH
            cd /home/frappe/frappe-bench

            echo "==> Reinstalling koraflow_core python package..."
            ./env/bin/pip install -e apps/koraflow_core --quiet

            echo "==> Running migrations..."
            bench --site portal.slim2well.com migrate
            bench --site speelkind.co.za migrate || echo "speelkind.co.za migrate skipped"
            bench --site koraflow.com migrate || echo "koraflow.com migrate skipped"

            echo "==> Building all app assets..."
            bench build

            echo "==> Restarting services..."
            sudo supervisorctl restart frappe-bench-web:frappe-bench-frappe-web
            sudo supervisorctl restart frappe-bench-workers:

            echo "==> Deploy complete."
          ENDSSH

      - name: Health check
        run: |
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://portal.slim2well.com)
          echo "Site responded: $STATUS"
          if [ "$STATUS" != "200" ] && [ "$STATUS" != "302" ]; then
            echo "Health check FAILED — site returned $STATUS"
            exit 1
          fi
          echo "Health check PASSED"
