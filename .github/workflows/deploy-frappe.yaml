name: Deploy Frappe Backend

on:
  push:
    branches:
      - 'release/**'

env:
  REGION: ${{ vars.GCP_REGION }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - id: 'auth'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: 'Build and Push Container'
        run: |
          # Build from repo root, using deploy/Dockerfile
          gcloud builds submit \
            --tag gcr.io/${{ vars.GCP_PROJECT_ID }}/frappe:$GITHUB_SHA \
            --config=cloudbuild.yaml \
            .

  deploy-staging:
    needs: build
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - id: 'auth'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY_STAGING }}'

      - name: 'Deploy to Staging'
        uses: 'google-github-actions/deploy-cloudrun@v2'
        with:
          service: staging-frappe
          image: gcr.io/${{ vars.GCP_PROJECT_ID }}/frappe:${{ github.sha }}
          region: ${{ env.REGION }}
          env_vars: |
            ENVIRONMENT=staging
            ALLOW_PROD_MIGRATE=false

  deploy-prod:
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production  # Requires manual approval in GitHub Settings
    steps:
      - id: 'auth'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY_PROD }}'

      - name: 'Deploy to Production (Code Only)'
        uses: 'google-github-actions/deploy-cloudrun@v2'
        with:
          service: prod-frappe
          image: gcr.io/${{ vars.GCP_PROJECT_ID }}/frappe:${{ github.sha }}
          region: ${{ env.REGION }}
          env_vars: |
            ENVIRONMENT=production
            ALLOW_PROD_MIGRATE=false  # SAFE DEFAULT. Never auto-migrate prod.
