# Example Pre-commit Configuration
# Copy this to .pre-commit-config.yaml and customize as needed

exclude: 'node_modules|.git|bench/'
default_stages: [pre-commit]
fail_fast: false

repos:
  # Standard pre-commit hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.3.0
    hooks:
      - id: trailing-whitespace
        exclude: ".*json$|.*txt$|.*csv|.*md|.*svg"
      - id: check-yaml
      - id: check-merge-conflict
      - id: check-ast
      - id: check-json
      - id: check-toml
      - id: debug-statements

  # Ruff for Python linting and formatting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.13.2
    hooks:
      - id: ruff
        name: "Run ruff linter and apply fixes"
        args: ["--fix"]
      - id: ruff-format
        name: "Format Python code"

  # Prettier for JavaScript/Vue/SCSS
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v2.7.1
    hooks:
      - id: prettier
        types_or: [javascript, vue, scss]
        exclude: |
            (?x)^(
                .*public/dist/.*|
                .*node_modules.*|
                .*boilerplate.*|
                .*templates/includes/.*|
                .*public/js/lib/.*
            )$

  # ESLint for JavaScript
  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v8.44.0
    hooks:
      - id: eslint
        types_or: [javascript]
        args: ['--quiet']
        exclude: |
            (?x)^(
                .*public/dist/.*|
                cypress/.*|
                .*node_modules.*|
                .*boilerplate.*|
                .*templates/includes/.*|
                .*public/js/lib/.*
            )$

  # Frappe Code Review using Ollama RAG (optional)
  # Requires Ollama to be running and FAISS index to be built
  - repo: local
    hooks:
      - id: frappe-code-review
        name: Frappe Code Review (Ollama RAG)
        entry: python scripts/pre_commit_review.py
        language: system
        types: [python, javascript]
        pass_filenames: false
        # Uncomment to enable (requires Ollama running)
        # stages: [pre-commit]

ci:
    autoupdate_schedule: weekly
    skip: []
    submodules: false

