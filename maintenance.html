<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Slim2Well — Back Soon</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f9fafb;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #2d2d2d;
    }
    .container {
      text-align: center;
      padding: 2rem;
      max-width: 480px;
    }
    .logo {
      width: 64px;
      height: 64px;
      background: #2d2d2d;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 2rem;
    }
    .logo span {
      color: #c1e12f;
      font-size: 28px;
      font-weight: 800;
    }
    h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      color: #2d2d2d;
    }
    p {
      font-size: 1rem;
      color: #6b7280;
      line-height: 1.6;
    }
    .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: #c1e12f;
      border-radius: 50%;
      margin: 2rem auto 0;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.8); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo"><span>S</span></div>
    <h1>Back soon.</h1>
    <p>We're making improvements to the Slim2Well platform.<br>Please check back in a few minutes.</p>
    <div class="dot"></div>
  </div>
</body>
</html>
