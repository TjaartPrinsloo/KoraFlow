version: '3.8'

services:
  ingestion:
    build:
      context: ./ingestion
      dockerfile: Dockerfile
    volumes:
      - ./repos:/app/repos
      - ./docs:/app/docs
      - ./chunks:/app/chunks
      - ./config.yml:/app/config.yml:ro
      - ./repo_metadata.json:/app/repo_metadata.json:rw
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - koraflow-network

  vector_store:
    build:
      context: ./vector_store
      dockerfile: Dockerfile
    volumes:
      - ./vector_store/indices:/app/indices
      - ./chunks:/app/chunks:ro
      - ./config.yml:/app/config.yml:ro
      - ./index_metadata.json:/app/index_metadata.json
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - koraflow-network
    depends_on:
      - ingestion

  llm_service:
    build:
      context: ./llm_service
      dockerfile: Dockerfile
    volumes:
      - ./vector_store/indices:/app/indices:ro
      - ./config.yml:/app/config.yml:ro
    environment:
      - PYTHONUNBUFFERED=1
      - OLLAMA_HOST=${OLLAMA_HOST:-host.docker.internal}
      - OLLAMA_PORT=${OLLAMA_PORT:-11434}
    ports:
      - "8000:8001"
    networks:
      - koraflow-network
    depends_on:
      - vector_store

  mariadb:
    image: mariadb:10.11
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-admin}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-frappe}
    volumes:
      - mariadb-data:/var/lib/mysql
    ports:
      - "3307:3306"
    networks:
      - koraflow-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    networks:
      - koraflow-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

